#
# MMS Extend Module Configuration
#
#--------------------------- Extended MCU ---------------------------#
[mcu buffer_2]
serial:   /dev/serial/by-id/usb-Klipper_stm32f042x6_buffer_2-if00   # USB connection

[mcu vivid_2]
serial:   /dev/serial/by-id/usb-Klipper_stm32g0b1xx_vivid_2-if00     # USB connection

#--------------------------- Extended MMS Stepper ---------------------------#
[manual_stepper selector_stepper_2]
step_pin:          vivid_2:PD3    # Step pin
dir_pin:           vivid_2:PD2    # Direction pin
enable_pin:        !vivid_2:PB4   # Enable pin (active low)
microsteps:        16             # Microsteps setting
# rotation_distance: 360            # Rotation distance (degrees), full_steps_per_rotation=200
rotation_distance: 400            # Rotation distance (degrees), full_steps_per_rotation=200
gear_ratio:        2.5:1          # Gear ratio (effective rotation_distance: 400/2.5=160)
velocity:          100            # Velocity (mm/s)
accel:             100            # Acceleration (mm/s¬≤)

[tmc2209 manual_stepper selector_stepper_2]
uart_pin:          vivid_2:PB3    # UART communication pin
run_current:       1.0            # Run current (A)
stealthchop_threshold: 0          # 0=spreadCycle, 999999=stealthChop mode

[manual_stepper drive_stepper_2]
step_pin:          vivid_2:PB6    # Step pin
dir_pin:           vivid_2:PB5    # Direction pin
enable_pin:        !vivid_2:PB8   # Enable pin (active low)
microsteps:        16             # Microsteps setting
rotation_distance: 360            # Rotation distance (degrees)
gear_ratio:        43:1           # Gear ratio (effective rotation_distance: 8.372)
velocity:          100            # Velocity (mm/s)
accel:             100            # Acceleration (mm/s¬≤)

[tmc2209 manual_stepper drive_stepper_2]
uart_pin:          vivid_2:PB7    # UART communication pin
run_current:       0.7            # Run current (A)
stealthchop_threshold: 0          # 0=spreadCycle, 999999=stealthChop mode

#--------------------------- Extended LED ---------------------------#
[neopixel vivid_rgb_2_1]
pin:          vivid_2:PC6   # Data pin
color_order:  GRB           # Color order
initial_RED:  0.01          # Initial red brightness
chain_count:  14            # Number of LEDs in chain

[neopixel vivid_rgb_2_2]
pin:          vivid_2:PC7   # Data pin
color_order:  GRB           # Color order
initial_BLUE: 0.01          # Initial blue brightness
chain_count:  14            # Number of LEDs in chain

#--------------------------- Extended RFID ---------------------------#
[mms rfid mfrc522_2_0]
cs_pin:          vivid_2:PB14         # Chip select pin
spi_bus:         spi2_PB2_PB11_PB10   # SPI bus configuration
slots:           0,1                  # Associated slot numbers (SLOT0, SLOT1)
rfid_data_file:  rfid/rfid_write.json # RFID data file

[mms rfid mfrc522_2_1]
cs_pin:          vivid_2:PA8          # Chip select pin
spi_bus:         spi2_PB2_PB11_PB10   # SPI bus configuration
slots:           2,3                  # Associated slot numbers (SLOT2, SLOT3)
rfid_data_file:  rfid/rfid_write.json # RFID data file

#--------------------------- Extend Heater Configuration ---------------------------#
# Controller Fan
[controller_fan my_controller_fan_2]
pin:     vivid_2:PA14   # Fan control pin
stepper: manual_stepper selector_stepper_2, manual_stepper drive_stepper_2   # Monitored steppers

# Temperature Sensors
[temperature_sensor _PTC_Temper_2]
sensor_pin:      vivid_2:PA4    # Sensor input pin
sensor_type:     Generic 3950   # Sensor type
pullup_resistor: 2200           # Pullup resistor value (ohms)
min_temp:        -20            # Minimum temperature (C)
max_temp:        100            # Maximum temperature (C)

[temperature_sensor ViViD_Dryer_L_2]
sensor_type:          AHT3X          # Sensor type
i2c_mcu:              vivid_2        # I2C MCU
# i2c_bus:            i2c1_PA9_PA10
i2c_software_scl_pin: vivid_2:PA9      # Software I2C clock pin
i2c_software_sda_pin: vivid_2:PA10     # Software I2C data pin
aht10_report_time:    5              # Report interval (seconds)
min_temp:             -20            # Minimum temperature (C)
max_temp:             100            # Maximum temperature (C)

[temperature_sensor ViViD_Dryer_R_2]
sensor_type:          AHT3X          # Sensor type
i2c_mcu:              vivid_2        # I2C MCU
# i2c_bus:            i2c3_PA7_PA6
i2c_software_scl_pin: vivid_2:PA7      # Software I2C clock pin
i2c_software_sda_pin: vivid_2:PA6      # Software I2C data pin
aht10_report_time:    5              # Report interval (seconds)
min_temp:             -20            # Minimum temperature (C)
max_temp:             100            # Maximum temperature (C)

# Heater Configuration
[heater_generic ViViD_Dryer_2]
heater_pin:         vivid_2:PC14              # Heater control pin
sensor_type:        temperature_combined      # Combined sensor type
sensor_list:        aht10 ViViD_Dryer_L_2, aht10 ViViD_Dryer_R_2   # Combined sensors
combination_method: max                     # Combination method
maximum_deviation:  100                     # Maximum temperature deviation
control:            pid                     # Control method
pid_Kp:             51.604                  # PID proportional gain
pid_Ki:             1.121                   # PID integral gain
pid_Kd:             593.934                 # PID derivative gain
min_temp:           -20                     # Minimum temperature (C)
max_temp:           65                      # Maximum temperature (C)

# Heater Verification
[verify_heater ViViD_Dryer_2]
max_error:       300    # Maximum temperature error
check_gain_time: 600    # Gain check timeout (seconds)
hysteresis:      10     # Hysteresis value
heating_gain:    1      # Minimum heating gain

# Heater Fan
[heater_fan ViViD_Dryer_Fan_2]
pin:            vivid_2:PC15   # Fan control pin
max_power:      0.3            # Maximum power (0.0-1.0)
shutdown_speed: 0              # Speed at shutdown (0.0-1.0)
heater:         ViViD_Dryer_2  # Associated heater

#--------------------------- Extended Slots ---------------------------#
[mms slot 4]
# Pins mapping
selector:     !vivid_2:PD0     # Selector endstop pin
inlet:        vivid_2:PA0      # Inlet sensor pin
gate:         buffer_2:PA0     # Buffer gate pin

# LED mapping
led_name:     neopixel vivid_rgb_2_1   # LED controller name
chip_index:   0,1,2,3,4,5,6            # LED indices for this slot
brightness:   1.0                      # Brightness level (1.0 = 100%)

# Autoload
autoload_enable: 1                      # Autoload enable (0=disable, 1=enable)

# RFID
rfid_name:       mms rfid mfrc522_2_0   # RFID reader name
rfid_enable:     0                      # RFID enable (0=disable, 1=enable)
rfid_detect_duration: 50                # RFID detection duration (seconds)
rfid_read_duration:   4                 # RFID read duration (seconds)

# Endless spool
endless_with_slot:               5    # Linked endless backup slot number

# Selector refine calibration
selector_calibrate_distance:     2.0  # Stepper Selector calibrate distance (mm)

[mms slot 5]
# Pins mapping
selector:     !vivid_2:PA15    # Selector endstop pin
inlet:        vivid_2:PA1      # Inlet sensor pin
gate:         buffer_2:PA1     # Buffer gate pin

# LED mapping
led_name:     neopixel vivid_rgb_2_1   # LED controller name
chip_index:   7,8,9,10,11,12,13        # LED indices for this slot
brightness:   1.0                      # Brightness level (1.0 = 100%)

# Autoload
autoload_enable: 1                      # Autoload enable (0=disable, 1=enable)

# RFID
rfid_name:       mms rfid mfrc522_2_0   # RFID reader name
rfid_enable:     0                      # RFID enable (0=disable, 1=enable)
rfid_detect_duration: 50                # RFID detection duration (seconds)
rfid_read_duration:   4                 # RFID read duration (seconds)

# Endless spool
endless_with_slot:               6    # Linked endless backup slot number

# Selector refine calibration
selector_calibrate_distance:     2.0  # Stepper Selector calibrate distance (mm)

[mms slot 6]
# Pins mapping
selector:     !vivid_2:PD1     # Selector endstop pin
inlet:        vivid_2:PA2      # Inlet sensor pin
gate:         buffer_2:PA2     # Buffer gate pin

# LED mapping
led_name:     neopixel vivid_rgb_2_2   # LED controller name
chip_index:   0,1,2,3,4,5,6            # LED indices for this slot
brightness:   1.0                      # Brightness level (1.0 = 100%)

# Autoload
autoload_enable: 1                      # Autoload enable (0=disable, 1=enable)

# RFID
rfid_name:       mms rfid mfrc522_2_1   # RFID reader name
rfid_enable:     0                      # RFID enable (0=disable, 1=enable)
rfid_detect_duration: 50                # RFID detection duration (seconds)
rfid_read_duration:   4                 # RFID read duration (seconds)

# Endless spool
endless_with_slot:               7    # Linked endless backup slot number

# Selector refine calibration
selector_calibrate_distance:     2.0  # Stepper Selector calibrate distance (mm)

[mms slot 7]
# Pins mapping
selector:     !vivid_2:PC13    # Selector endstop pin
inlet:        vivid_2:PA3      # Inlet sensor pin
gate:         buffer_2:PA3     # Buffer gate pin

# LED mapping
led_name:     neopixel vivid_rgb_2_2   # LED controller name
chip_index:   7,8,9,10,11,12,13        # LED indices for this slot
brightness:   1.0                      # Brightness level (1.0 = 100%)

# Autoload
autoload_enable: 1                      # Autoload enable (0=disable, 1=enable)

# RFID
rfid_name:       mms rfid mfrc522_2_1   # RFID reader name
rfid_enable:     0                      # RFID enable (0=disable, 1=enable)
rfid_detect_duration: 50                # RFID detection duration (seconds)
rfid_read_duration:   4                 # RFID read duration (seconds)

# Endless spool
